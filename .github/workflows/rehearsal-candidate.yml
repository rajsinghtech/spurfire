name: Protected Rehearsal Candidate

on:
  workflow_dispatch:
    inputs:
      source_sha:
        description: Exact lowercase 40-hex current default-branch commit to build
        required: true
        type: string

# Candidate artifacts are intentionally untrusted and nonpublishing. This
# workflow has no environment, secret, OIDC, package, release, deployment, tag,
# or push authority. Protect this workflow file through default-branch rules.
permissions:
  contents: read

concurrency:
  group: rehearsal-candidate-${{ inputs.source_sha }}
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7.1
  GODOT_RELEASE: 4.7.1-stable
  GODOT_TEMPLATE_SHA512: afcc83d8d3d298038f19c58744a0d660fa75dd4baa33cb55d1011bb2565a2a8c2381728924564cb909e37c205a23f21b521b23bd057993afd43ae4da0b2f9d47
  REHEARSAL_CONTROL_ORIGIN: https://rehearsal.spurfire.rajsingh.info
  CARGO_TARGET_DIR: ${{ github.workspace }}/target-rehearsal-only

jobs:
  build:
    name: Build fixed-origin nonpublishing macOS candidate
    runs-on: macos-14
    timeout-minutes: 45
    steps:
      - name: Validate requested exact source
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail
          [[ "$SOURCE_SHA" =~ ^[0-9a-f]{40}$ ]]
          test "$GITHUB_REF" = "refs/heads/$DEFAULT_BRANCH"
          test "$SOURCE_SHA" = "$GITHUB_SHA"

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Assert exact checkout and fixed workflow contract
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          test "$GITHUB_REF" = "refs/heads/${{ github.event.repository.default_branch }}"
          grep -Fxq 'pub(crate) const REHEARSAL_CONTROL_ORIGIN: &str = "https://rehearsal.spurfire.rajsingh.info";' \
            crates/spurfire-gdext/src/lobby_client.rs
          grep -Fq 'REHEARSAL_CONTROL_ORIGIN: https://rehearsal.spurfire.rajsingh.info' \
            .github/workflows/rehearsal-candidate.yml

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Install pinned Godot and templates
        shell: bash
        run: |
          set -euo pipefail
          editor="Godot_v${GODOT_RELEASE}_macos.universal.zip"
          templates="Godot_v${GODOT_RELEASE}_export_templates.tpz"
          base_url="https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 -o "$editor" "$base_url/$editor"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 -o "$templates" "$base_url/$templates"
          echo "a5c6443e193829de9a3237b57ef5e01c23839888900e241543da0dd4bac1050125e19469f0cca9a9958ac346070d98cab8e5d6aee16b181c6d06cda86bd07224  $editor" | shasum -a 512 -c -
          echo "${GODOT_TEMPLATE_SHA512}  $templates" | shasum -a 512 -c -
          unzip -q "$editor"
          unzip -q "$templates" -d "$RUNNER_TEMP/templates"
          destination="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$destination"
          cp -R "$RUNNER_TEMP/templates/templates/." "$destination/"

      - name: Build only the compile-time rehearsal origin
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p game/bin/macos
          for target in x86_64-apple-darwin aarch64-apple-darwin; do
            arch=x86_64
            test "$target" = aarch64-apple-darwin && arch=arm64
            cargo build --locked --release -p spurfire-gdext --target "$target" \
              --no-default-features --features rehearsal-control-origin
            strings "$CARGO_TARGET_DIR/$target/release/libspurfire_godot.dylib" > "$RUNNER_TEMP/$target.strings"
            grep -Fq "$REHEARSAL_CONTROL_ORIGIN" "$RUNNER_TEMP/$target.strings"
            for profile in debug release; do
              cp "$CARGO_TARGET_DIR/$target/release/libspurfire_godot.dylib" \
                "game/bin/macos/libspurfire_godot.$profile.$arch.dylib"
              codesign --force --sign - "game/bin/macos/libspurfire_godot.$profile.$arch.dylib"
            done
          done
          mkdir -p dist
          ./Godot.app/Contents/MacOS/Godot --headless --path game --export-release macOS
          test -s dist/Spurfire-macos-universal.zip

      - name: Launch and create exact trust record
        shell: bash
        env:
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          unpack="$RUNNER_TEMP/final"
          mkdir -p "$unpack"
          unzip -q dist/Spurfire-macos-universal.zip -d "$unpack"
          app="$(find "$unpack" -maxdepth 2 -name '*.app' -type d -print -quit)"
          test -n "$app"
          "$app/Contents/MacOS/Spurfire" --headless --audio-driver Dummy --quit-after 30
          archive_sha256="$(shasum -a 256 dist/Spurfire-macos-universal.zip | cut -d ' ' -f 1)"
          jq -n --arg source_sha "$SOURCE_SHA" --arg origin "$REHEARSAL_CONTROL_ORIGIN" \
            --arg archive_sha256 "$archive_sha256" '{
              schema_version: 2,
              candidate_mode: "rehearsal",
              platform: "macos-universal",
              control_origin: $origin,
              source_sha: $source_sha,
              archive: "Spurfire-macos-universal.zip",
              archive_sha256: $archive_sha256,
              launch_smoke_passed: true,
              signature: "ad_hoc",
              signing_trust: "untrusted",
              release_eligible: false,
              publication: "forbidden"
            }' > dist/macos-rehearsal-trust.json
          python3 scripts/make-rehearsal-candidate-metadata.py \
            --input-dir dist --output-dir rehearsal-metadata \
            --source-sha "$SOURCE_SHA" --control-origin "$REHEARSAL_CONTROL_ORIGIN"
          cp rehearsal-metadata/* dist/

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: rehearsal-candidate-${{ inputs.source_sha }}
          path: |
            dist/Spurfire-macos-universal.zip
            dist/macos-rehearsal-trust.json
            dist/rehearsal-candidate-manifest.json
            dist/SHA256SUMS
          if-no-files-found: error
          retention-days: 3
