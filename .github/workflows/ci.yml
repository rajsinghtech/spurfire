name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Rust source gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install checksum-verified just
        shell: bash
        run: scripts/install-just-ci.sh

      - name: Validate release metadata
        shell: bash
        run: scripts/check-release-metadata.sh

      - name: cargo check (locked)
        run: cargo check --locked --all-targets

      - name: just check
        run: just check

  game:
    name: Godot / Rust M2 (Linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GODOT_VERSION: 4.7.1
      GODOT_TIMEOUT_SECONDS: 120
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Install checksum-verified just
        run: scripts/install-just-ci.sh

      - name: Install Godot runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes libasound2t64 libfontconfig1 libgl1 libxi6 libxcursor1 libxinerama1 libxrandr2 unzip

      - name: Download and verify pinned Godot
        shell: bash
        run: |
          set -euo pipefail
          release="${GODOT_VERSION}-stable"
          archive="Godot_v${release}_linux.x86_64.zip"
          base_url="https://github.com/godotengine/godot/releases/download/${release}"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 --output "$archive" "$base_url/$archive"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 --output SHA512-SUMS.txt "$base_url/SHA512-SUMS.txt"
          grep -F "  $archive" SHA512-SUMS.txt > SHA512-SUMS.godot
          test "$(wc -l < SHA512-SUMS.godot)" -eq 1
          sha512sum --check SHA512-SUMS.godot
          unzip -q "$archive"
          sudo install -m 0755 "Godot_v${release}_linux.x86_64" /usr/local/bin/godot4
          godot4 --version

      - name: Validate game and release helpers
        run: |
          bash -n scripts/build-gdext.sh scripts/test-godot.sh scripts/install-just-ci.sh scripts/check-release-metadata.sh scripts/check-godot-secret-paths.sh
          scripts/check-godot-secret-paths.sh
          scripts/build-gdext.sh --self-test
          scripts/test-godot.sh --self-test
          scripts/check-release-metadata.sh

      - name: Run credential-free signed peer and migration process proofs
        shell: bash
        run: just p2p-proof

      - name: Build extension and run bounded gameplay and one-lobby smoke tests
        shell: bash
        run: |
          set -euo pipefail
          just game-test 2>&1 | tee "$RUNNER_TEMP/godot-smoke.log"
          scripts/check-alpha-smoke-log.sh "$RUNNER_TEMP/godot-smoke.log"

  release-qa:
    name: Alpha release QA tooling
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate release/check tooling
        shell: bash
        run: |
          set -euo pipefail
          bash -n \
            scripts/check-alpha-smoke-log.sh \
            scripts/check-godot-secret-paths.sh \
            scripts/prove-local-p2p.sh \
            scripts/run-alpha-two-client.sh \
            scripts/check-release-metadata.sh
          python3 -m py_compile \
            scripts/aggregate-playtest.py \
            scripts/check-alpha-evidence.py \
            scripts/check-alpha-lifecycle-evidence.py \
            scripts/make-alpha-candidate-metadata.py
          python3 -m unittest discover -s scripts/tests -v
          scripts/check-godot-secret-paths.sh
          if proof_output="$(TS_CLIENT_ID=sentinel scripts/prove-local-p2p.sh 2>&1)"; then
            echo 'error: signed process proof accepted an inherited credential variable' >&2
            exit 1
          fi
          grep -Fqx 'error: TS_CLIENT_ID must be unset for the credential-free process proof' <<<"$proof_output"

      - name: Confirm the evidence template fails closed
        shell: bash
        run: |
          set -euo pipefail
          if scripts/check-alpha-evidence.py docs/release-evidence/template.json --version 0.2.0; then
            echo 'error: incomplete release-evidence template unexpectedly passed' >&2
            exit 1
          fi

  e2e:
    name: e2e (Tailscale API, manual)
    # Manual trigger only — never runs on PRs or pushes. Requires the
    # TS_CLIENT_ID / TS_CLIENT_SECRET repository secrets to be configured.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2

      - name: Write .env from secrets
        env:
          TS_CLIENT_ID: ${{ secrets.TS_CLIENT_ID }}
          TS_CLIENT_SECRET: ${{ secrets.TS_CLIENT_SECRET }}
        run: |
          if [ -z "$TS_CLIENT_ID" ] || [ -z "$TS_CLIENT_SECRET" ]; then
            echo "::error::TS_CLIENT_ID / TS_CLIENT_SECRET secrets are not configured"
            exit 1
          fi
          umask 077
          printf 'TS_CLIENT_ID=%s\nTS_CLIENT_SECRET=%s\nTS_API_BASE=https://api.tailscale.com/api/v2\n' \
            "$TS_CLIENT_ID" "$TS_CLIENT_SECRET" > .env

      - name: Run e2e smoke test
        run: scripts/ts-api.sh token
