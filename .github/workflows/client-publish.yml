name: Publish Existing Client Artifacts

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to publish
        required: true
        type: string
      run_id:
        description: Successful tag-triggered Client Preflight run containing the platform artifacts
        required: true
        type: string

permissions: {}

concurrency:
  group: client-publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish verified client artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      actions: read
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate source run, jobs, artifacts, and tag
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_RUN_ID: ${{ inputs.run_id }}
        run: |
          set -euo pipefail

          expected_repository='rajsinghtech/spurfire'
          expected_workflow='.github/workflows/client-release.yml'
          test "$GITHUB_REPOSITORY" = "$expected_repository"
          [[ "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          [[ "$SOURCE_RUN_ID" =~ ^[0-9]+$ ]]

          git show-ref --verify --quiet "refs/tags/$RELEASE_TAG"
          tag_sha="$(git rev-parse "$RELEASE_TAG^{commit}")"
          notes="docs/release-notes-${RELEASE_TAG#v}.md"
          git cat-file -e "$RELEASE_TAG:$notes"
          git show "$RELEASE_TAG:$notes" > "$RUNNER_TEMP/release-notes.md"
          test -s "$RUNNER_TEMP/release-notes.md"

          workflow_id="$(
            gh api "/repos/$expected_repository/actions/workflows/client-release.yml" \
              --jq .id
          )"
          [[ "$workflow_id" =~ ^[0-9]+$ ]]

          run_json="$(
            gh api "/repos/$expected_repository/actions/runs/$SOURCE_RUN_ID"
          )"
          jq -e \
            --arg repository "$expected_repository" \
            --arg workflow "$expected_workflow" \
            --arg tag "$RELEASE_TAG" \
            --arg sha "$tag_sha" \
            --argjson workflow_id "$workflow_id" \
            '(.name == "Client Preflight") and
             (.path == $workflow) and
             (.workflow_id == $workflow_id) and
             (.event == "push") and
             (.status == "completed") and
             (.conclusion == "success") and
             (.head_branch == $tag) and
             (.head_sha == $sha) and
             (.repository.full_name == $repository) and
             (.head_repository.full_name == $repository)' \
            <<< "$run_json" > /dev/null

          jobs_json="$(
            gh api "/repos/$expected_repository/actions/runs/$SOURCE_RUN_ID/jobs?per_page=100"
          )"
          jq -e '
            ([.jobs[] | {name, status, conclusion}] | sort_by(.name)) ==
            ([
              {name: "Validate client preflight", status: "completed", conclusion: "success"},
              {name: "Linux x86_64 client", status: "completed", conclusion: "success"},
              {name: "Windows x86_64 client", status: "completed", conclusion: "success"},
              {name: "macOS universal client", status: "completed", conclusion: "success"}
            ] | sort_by(.name))' <<< "$jobs_json" > /dev/null

          ci_runs_json="$(
            gh api "/repos/$expected_repository/actions/workflows/ci.yml/runs?head_sha=$tag_sha&event=push&status=completed&per_page=100"
          )"
          ci_run_id="$(
            jq -er \
              --arg repository "$expected_repository" \
              --arg tag "$RELEASE_TAG" \
              --arg sha "$tag_sha" '
                [.workflow_runs[] |
                  select(
                    (.name == "CI") and
                    (.path == ".github/workflows/ci.yml") and
                    (.event == "push") and
                    (.head_branch == $tag) and
                    (.head_sha == $sha) and
                    (.conclusion == "success") and
                    (.repository.full_name == $repository) and
                    (.head_repository.full_name == $repository)
                  )] |
                if length >= 1 then sort_by(.run_attempt) | last | .id
                else error("no successful tag CI run") end' \
              <<< "$ci_runs_json"
          )"
          [[ "$ci_run_id" =~ ^[0-9]+$ ]]

          ci_jobs_json="$(
            gh api "/repos/$expected_repository/actions/runs/$ci_run_id/jobs?per_page=100"
          )"
          jq -e '
            def passed($name):
              any(.jobs[];
                (.name == $name) and
                (.status == "completed") and
                (.conclusion == "success"));
            passed("Rust source gates (ubuntu-latest)") and
            passed("Rust source gates (macos-latest)") and
            passed("Rust source gates (windows-latest)") and
            passed("Godot / Rust M2 (Linux)")' \
            <<< "$ci_jobs_json" > /dev/null

          artifacts_json="$(
            gh api "/repos/$expected_repository/actions/runs/$SOURCE_RUN_ID/artifacts?per_page=100"
          )"
          jq -e '
            (.total_count == 3) and
            (([.artifacts[].name] | sort) ==
             (["client-linux", "client-macos", "client-windows"] | sort)) and
            all(.artifacts[]; (.expired == false) and (.size_in_bytes > 0))' \
            <<< "$artifacts_json" > /dev/null

          releases_json="$(
            gh api "/repos/$expected_repository/releases?per_page=100"
          )"
          matching_releases="$(
            jq --arg tag "$RELEASE_TAG" \
              '[.[] | select(.tag_name == $tag)]' <<< "$releases_json"
          )"
          release_count="$(jq length <<< "$matching_releases")"
          test "$release_count" -le 1
          if test "$release_count" -eq 1; then
            jq -e '.[0].draft == true' <<< "$matching_releases" > /dev/null || {
              echo "release $RELEASE_TAG is already published; refusing to overwrite it" >&2
              exit 1
            }
          fi

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          github-token: ${{ github.token }}
          run-id: ${{ inputs.run_id }}
          pattern: client-*
          path: release
          merge-multiple: true

      - name: Verify and publish release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail

          cd release
          mapfile -t files < <(find . -maxdepth 1 -type f -printf '%f\n' | sort)
          expected=(
            Spurfire-linux-x86_64.tar.gz
            Spurfire-macos-universal.zip
            Spurfire-windows-x86_64.zip
          )
          test "${files[*]}" = "${expected[*]}"
          for file in "${expected[@]}"; do
            test -s "$file"
          done
          sha256sum "${expected[@]}" > SHA256SUMS
          cd ..

          releases_json="$(
            gh api "/repos/$GITHUB_REPOSITORY/releases?per_page=100"
          )"
          release_count="$(
            jq --arg tag "$RELEASE_TAG" \
              '[.[] | select(.tag_name == $tag)] | length' <<< "$releases_json"
          )"
          test "$release_count" -le 1
          if test "$release_count" -eq 0; then
            gh release create "$RELEASE_TAG" \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --draft \
              --title "Spurfire ${RELEASE_TAG#v}" \
              --notes-file "$RUNNER_TEMP/release-notes.md" \
              release/Spurfire-linux-x86_64.tar.gz \
              release/Spurfire-macos-universal.zip \
              release/Spurfire-windows-x86_64.zip \
              release/SHA256SUMS > /dev/null
          fi

          release_json="$(
            gh api "/repos/$GITHUB_REPOSITORY/releases?per_page=100" |
              jq -c --arg tag "$RELEASE_TAG" \
                '[.[] | select(.tag_name == $tag)] |
                 if length == 1 then .[0] else error("expected one draft release") end'
          )"
          jq -e --arg tag "$RELEASE_TAG" --arg name "Spurfire ${RELEASE_TAG#v}" '
            (.tag_name == $tag) and
            (.name == $name) and
            (.draft == true) and
            (.prerelease == false) and
            (([.assets[].name] | sort) ==
             ([
               "SHA256SUMS",
               "Spurfire-linux-x86_64.tar.gz",
               "Spurfire-macos-universal.zip",
               "Spurfire-windows-x86_64.zip"
             ] | sort)) and
            all(.assets[]; (.state == "uploaded") and (.size > 0))' \
            <<< "$release_json" > /dev/null

          verify_dir="$(mktemp -d)"
          for file in "${expected[@]}" SHA256SUMS; do
            asset_id="$(
              jq -er --arg name "$file" '
                [.assets[] | select(.name == $name)] |
                if length == 1 then .[0].id else error("asset mismatch") end' \
                <<< "$release_json"
            )"
            gh api \
              -H 'Accept: application/octet-stream' \
              "/repos/$GITHUB_REPOSITORY/releases/assets/$asset_id" \
              > "$verify_dir/$file"
            cmp -s "release/$file" "$verify_dir/$file"
          done

          release_id="$(jq -er .id <<< "$release_json")"
          jq -n --arg name "Spurfire ${RELEASE_TAG#v}" \
            --rawfile body "$RUNNER_TEMP/release-notes.md" \
            '{name: $name, body: $body, draft: false, prerelease: false}' \
            > "$RUNNER_TEMP/publish-release.json"
          gh api --method PATCH \
            "/repos/$GITHUB_REPOSITORY/releases/$release_id" \
            --input "$RUNNER_TEMP/publish-release.json" > /dev/null

          gh api "/repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" |
            jq -e --arg tag "$RELEASE_TAG" '
              (.tag_name == $tag) and
              (.draft == false) and
              (.prerelease == false) and
              (([.assets[].name] | sort) ==
               ([
                 "SHA256SUMS",
                 "Spurfire-linux-x86_64.tar.gz",
                 "Spurfire-macos-universal.zip",
                 "Spurfire-windows-x86_64.zip"
               ] | sort))' > /dev/null
