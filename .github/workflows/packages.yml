name: Packages

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: packages-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

env:
  IMAGE: ghcr.io/rajsinghtech/spurfire-server
  CHART_REGISTRY: oci://ghcr.io/rajsinghtech/charts
  CHART_REPOSITORY: ghcr.io/rajsinghtech/charts/spurfire-control
  HELM_VERSION: v3.18.6
  HELM_LINUX_AMD64_SHA256: 3f43c0aa57243852dd542493a0f54f1396c0bc8ec7296bbb2c01e802010819ce
  ACTIONLINT_VERSION: 1.7.12
  ACTIONLINT_LINUX_AMD64_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8

jobs:
  metadata:
    name: Validate package metadata
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      chart_app_version: ${{ steps.meta.outputs.chart_app_version }}
      chart_version: ${{ steps.meta.outputs.chart_version }}
      created: ${{ steps.meta.outputs.created }}
      image_tags: ${{ steps.meta.outputs.image_tags }}
      image_version: ${{ steps.meta.outputs.image_version }}
      release: ${{ steps.meta.outputs.release }}
    steps:
      - name: Check out source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Assert exact source
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Validate versions and derive tags
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          server_version="$(scripts/check-release-metadata.sh)"
          chart_version="$server_version"

          short_sha="${GITHUB_SHA:0:12}"
          created="$(git show -s --format=%cI "$GITHUB_SHA")"
          release=false
          tags=("$IMAGE:main" "$IMAGE:sha-$GITHUB_SHA")
          image_version="$server_version"
          chart_app_version="sha-$GITHUB_SHA"
          package_version="${chart_version}-main.${GITHUB_RUN_NUMBER}.${GITHUB_RUN_ATTEMPT}.sha-${short_sha}"

          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            release=true
            tag="$GITHUB_REF_NAME"
            tag_regex='^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?$'
            [[ "$tag" =~ $tag_regex ]] || {
              echo "invalid release tag: $tag (expected vX.Y.Z or vX.Y.Z-prerelease)" >&2
              exit 1
            }
            version="${tag#v}"
            if [[ "$version" == *-* ]]; then
              prerelease="${version#*-}"
              IFS=. read -ra identifiers <<< "$prerelease"
              for identifier in "${identifiers[@]}"; do
                if [[ "$identifier" =~ ^[0-9]+$ && "$identifier" != "0" && "$identifier" == 0* ]]; then
                  echo "invalid numeric prerelease identifier with a leading zero: $identifier" >&2
                  exit 1
                fi
              done
            fi
            test "$version" = "$server_version" || {
              echo "tag $tag does not match package/chart version $server_version" >&2
              exit 1
            }
            notes="docs/release-notes-${version}.md"
            test -s "$notes" || {
              echo "missing release notes: $notes" >&2
              exit 1
            }
            evidence="docs/release-evidence/${version}.json"
            scripts/check-alpha-evidence.py "$evidence" \
              --version "$version"
            scripts/check-release-tag-binding.sh "$version" "$GITHUB_SHA" >/dev/null

            git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
            git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main || {
              echo "tagged commit is not an ancestor of origin/main" >&2
              exit 1
            }

            image_version="$version"
            chart_app_version="$version"
            package_version="$version"
            tags=("$IMAGE:$tag" "$IMAGE:$version" "$IMAGE:sha-$GITHUB_SHA")
            if [[ "$version" != *-* ]]; then
              IFS=. read -r major minor _patch <<< "$version"
              tags+=("$IMAGE:$major.$minor" "$IMAGE:latest")
            fi
          fi

          {
            echo "chart_app_version=$chart_app_version"
            echo "chart_version=$package_version"
            echo "created=$created"
            echo "image_version=$image_version"
            echo "release=$release"
            echo 'image_tags<<EOF'
            printf '%s\n' "${tags[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"

  validate:
    name: Rust, Helm, and secret checks
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Assert exact source
        run: test "$(git rev-parse HEAD)" = "$GITHUB_SHA"

      - name: Validate workflow, metadata, and shell syntax
        shell: bash
        run: |
          set -euo pipefail
          archive="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/$archive"
          echo "${ACTIONLINT_LINUX_AMD64_SHA256}  $archive" | sha256sum --check
          tar -xzf "$archive" actionlint
          ./actionlint
          bash -n \
            scripts/check-alpha-smoke-log.sh \
            scripts/check-packaging.sh \
            scripts/check-release-metadata.sh \
            scripts/finalize-oci-index.sh \
            scripts/install-just-ci.sh \
            scripts/prove-local-p2p.sh \
            scripts/run-alpha-two-client.sh
          shellcheck \
            scripts/check-alpha-smoke-log.sh \
            scripts/check-packaging.sh \
            scripts/check-release-metadata.sh \
            scripts/finalize-oci-index.sh \
            scripts/install-just-ci.sh \
            scripts/prove-local-p2p.sh \
            scripts/run-alpha-two-client.sh
          python3 -m py_compile \
            scripts/aggregate-playtest.py \
            scripts/check-alpha-evidence.py \
            scripts/check-alpha-lifecycle-evidence.py \
            scripts/make-alpha-candidate-metadata.py
          python3 -m unittest discover -s scripts/tests -v
          scripts/check-release-metadata.sh

      - name: Install Rust 1.91
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: '1.91.0'
          components: rustfmt, clippy

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: packages-1.91

      - name: Check focused Rust packages
        run: |
          cargo fmt --all --check
          cargo clippy --locked -p spurfire-server --all-targets -- -D warnings
          cargo test --locked -p spurfire-server -p spurfire-control -p spurfire-protocol

      - name: Install pinned Helm
        shell: bash
        run: |
          set -euo pipefail
          archive="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://get.helm.sh/$archive"
          echo "${HELM_LINUX_AMD64_SHA256}  $archive" | sha256sum --check
          tar -xzf "$archive"
          sudo install -m 0755 linux-amd64/helm /usr/local/bin/helm
          helm version --short

      - name: Validate Helm packaging contract
        run: scripts/check-packaging.sh

      - name: Scan repository for secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: secret
          skip-dirs: .git,target
          format: table
          exit-code: '1'

  container:
    name: Container (${{ matrix.arch }})
    needs: metadata
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            machine: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            machine: aarch64
    steps:
      - name: Check out exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Assert native runner and exact source
        env:
          EXPECTED_MACHINE: ${{ matrix.machine }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(uname -m)" = "$EXPECTED_MACHINE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Build validation image without publishing
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          load: true
          push: false
          tags: spurfire-server:validate-${{ matrix.arch }}
          build-args: |
            SPURFIRE_VERSION=${{ needs.metadata.outputs.image_version }}
            SPURFIRE_REVISION=${{ github.sha }}
            SPURFIRE_CREATED=${{ needs.metadata.outputs.created }}
          cache-from: type=gha,scope=spurfire-server-validate-${{ matrix.arch }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'trusted' || 'untrusted' }}
          cache-to: type=gha,mode=min,scope=spurfire-server-validate-${{ matrix.arch }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'trusted' || 'untrusted' }}

      - name: Verify native image, hardened runtime, and health
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          EXPECTED_CREATED: ${{ needs.metadata.outputs.created }}
          EXPECTED_VERSION: ${{ needs.metadata.outputs.image_version }}
        run: |
          set -euo pipefail
          image="spurfire-server:validate-$ARCH"
          test "$(docker image inspect --format '{{.Architecture}}' "$image")" = "$ARCH"
          test "$(docker image inspect --format '{{.Config.User}}' "$image")" = '10001:10001'
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.version"}}' "$image")" = "$EXPECTED_VERSION"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.revision"}}' "$image")" = "$GITHUB_SHA"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.created"}}' "$image")" = "$EXPECTED_CREATED"
          test "$(docker image inspect --format '{{index .Config.Labels "org.opencontainers.image.licenses"}}' "$image")" = 'BSD-3-Clause'
          docker run --rm --entrypoint /bin/sh "$image" -ec \
            'test ! -w /usr/local/bin/spurfire-server; test -w /var/lib/spurfire'

          name="spurfire-server-${GITHUB_RUN_ID}-${ARCH}"
          cleanup() { docker rm -f "$name" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run --detach --name "$name" \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:rw,noexec,nosuid,size=16m \
            --tmpfs /var/lib/spurfire:rw,noexec,nosuid,size=16m \
            --env SPURFIRE_DRY_RUN=1 \
            --env SPURFIRE_PROVISIONING_MODE=dry_run \
            --publish 127.0.0.1::8080 \
            "$image" >/dev/null

          port="$(docker port "$name" 8080/tcp | awk -F: 'NR == 1 { print $NF }')"
          response=''
          for _ in $(seq 1 60); do
            if ! docker inspect --format '{{.State.Running}}' "$name" | grep -qx true; then
              docker logs "$name" >&2
              exit 1
            fi
            response="$(curl --silent --show-error "http://127.0.0.1:${port}/healthz" || true)"
            if jq -e '.status == "ok" and .provisioning_ready == true' <<< "$response" >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          jq -e '.status == "ok" and .provisioning_ready == true' <<< "$response"
          test "$(docker inspect --format '{{.State.Pid}}' "$name")" -gt 0

      - name: Scan native image vulnerabilities and secrets
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.33.1
        with:
          image-ref: spurfire-server:validate-${{ matrix.arch }}
          scanners: vuln,secret
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          format: table
          exit-code: '1'

  publish-image:
    name: Publish image digest (${{ matrix.arch }})
    # Version tags validate above but never publish aliases. Stable publication is a
    # separate, protected release action after exact-SHA Alpha evidence is approved.
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'rajsinghtech/spurfire'
    needs: [metadata, validate, container]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            machine: x86_64
          - arch: arm64
            runner: ubuntu-24.04-arm
            machine: aarch64
    steps:
      - name: Check out exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Assert native runner and exact source
        env:
          EXPECTED_MACHINE: ${{ matrix.machine }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$(uname -m)" = "$EXPECTED_MACHINE"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push native image by digest
        id: image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          outputs: type=image,name=${{ env.IMAGE }},name-canonical=true,push-by-digest=true,push=true
          build-args: |
            SPURFIRE_VERSION=${{ needs.metadata.outputs.image_version }}
            SPURFIRE_REVISION=${{ github.sha }}
            SPURFIRE_CREATED=${{ needs.metadata.outputs.created }}
          cache-from: |
            type=gha,scope=spurfire-server-validate-${{ matrix.arch }}-trusted
            type=gha,scope=spurfire-server-publish-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=spurfire-server-publish-${{ matrix.arch }}
          provenance: mode=max
          sbom: true

      - name: Record immutable native digest
        shell: bash
        env:
          ARCH: ${{ matrix.arch }}
          DIGEST: ${{ steps.image.outputs.digest }}
        run: |
          set -euo pipefail
          [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          jq -n \
            --arg source_sha "$GITHUB_SHA" \
            --arg arch "$ARCH" \
            --arg image "$IMAGE" \
            --arg digest "$DIGEST" \
            --arg run_id "$GITHUB_RUN_ID" \
            --arg run_attempt "$GITHUB_RUN_ATTEMPT" \
            '{source_sha: $source_sha, arch: $arch, image: $image, digest: $digest, run_id: $run_id, run_attempt: $run_attempt}' \
            > "digest-${ARCH}.json"

      - name: Upload native digest record
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: image-digest-${{ matrix.arch }}
          path: digest-${{ matrix.arch }}.json
          if-no-files-found: error
          retention-days: 1

  publish:
    name: Finalize signed OCI main/SHA artifacts
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'rajsinghtech/spurfire'
    needs: [metadata, publish-image]
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      actions: read
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Check out exact source
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          persist-credentials: false

      - name: Assert exact source and current main head
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          current_main="$(git ls-remote --exit-code "https://github.com/${GITHUB_REPOSITORY}.git" refs/heads/main | awk 'NR == 1 { print $1 }')"
          [[ "$current_main" =~ ^[0-9a-f]{40}$ ]]
          test "$current_main" = "$GITHUB_SHA" || {
            echo "refusing to publish stale main commit $GITHUB_SHA; current main is $current_main" >&2
            exit 1
          }

      - name: Download native digest records
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: image-digest-*
          path: image-digests
          merge-multiple: true

      - name: Validate native digest records
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t records < <(find image-digests -maxdepth 1 -type f -name 'digest-*.json' -printf '%f\n' | sort)
          test "${#records[@]}" -eq 2
          test "${records[0]}" = digest-amd64.json
          test "${records[1]}" = digest-arm64.json
          for arch in amd64 arm64; do
            record="image-digests/digest-${arch}.json"
            test "$(jq -er '.source_sha' "$record")" = "$GITHUB_SHA"
            test "$(jq -er '.arch' "$record")" = "$arch"
            test "$(jq -er '.image' "$record")" = "$IMAGE"
            test "$(jq -er '.run_id' "$record")" = "$GITHUB_RUN_ID"
            test "$(jq -er '.run_attempt' "$record")" = "$GITHUB_RUN_ATTEMPT"
            digest="$(jq -er '.digest' "$record")"
            [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          done

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify native attestations and create tagged index
        id: image
        shell: bash
        env:
          IMAGE_TAGS: ${{ needs.metadata.outputs.image_tags }}
        run: |
          set -euo pipefail
          declare -A digests
          for arch in amd64 arm64; do
            digest="$(jq -er '.digest' "image-digests/digest-${arch}.json")"
            digests[$arch]="$digest"
            raw="$(docker buildx imagetools inspect "$IMAGE@$digest" --raw)"
            image_manifest="$(jq -er --arg arch "$arch" \
              '[.manifests[] | select((.annotations["vnd.docker.reference.type"] // "") != "attestation-manifest")] as $images | if (($images | length) == 1 and $images[0].platform.os == "linux" and $images[0].platform.architecture == $arch) then $images[0].digest else error("expected only the native image manifest") end' <<< "$raw")"
            attestation_manifest="$(jq -er --arg image_manifest "$image_manifest" \
              '[.manifests[] | select(.annotations["vnd.docker.reference.type"] == "attestation-manifest" and .annotations["vnd.docker.reference.digest"] == $image_manifest) | .digest] | if length == 1 then .[0] else error("expected one linked attestation manifest") end' <<< "$raw")"
            attestation="$(docker buildx imagetools inspect "$IMAGE@$attestation_manifest" --raw)"
            jq -e '[.layers[].annotations["in-toto.io/predicate-type"]] | index("https://spdx.dev/Document") != null' <<< "$attestation" >/dev/null
            jq -e '[.layers[].annotations["in-toto.io/predicate-type"] | select(startswith("https://slsa.dev/provenance/"))] | length >= 1' <<< "$attestation" >/dev/null
          done

          mapfile -t tags <<< "$IMAGE_TAGS"
          test "${#tags[@]}" -ge 1
          final_digest="$(scripts/finalize-oci-index.sh \
            "$IMAGE" \
            "${digests[amd64]}" \
            "${digests[arm64]}" \
            "${tags[@]}")"
          echo "digest=$final_digest" >> "$GITHUB_OUTPUT"

      - name: Install pinned Helm
        shell: bash
        run: |
          set -euo pipefail
          archive="helm-${HELM_VERSION}-linux-amd64.tar.gz"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 \
            --output "$archive" \
            "https://get.helm.sh/$archive"
          echo "${HELM_LINUX_AMD64_SHA256}  $archive" | sha256sum --check
          tar -xzf "$archive"
          sudo install -m 0755 linux-amd64/helm /usr/local/bin/helm

      - name: Package and push Helm chart
        id: chart
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ needs.metadata.outputs.chart_version }}
          APP_VERSION: ${{ needs.metadata.outputs.chart_app_version }}
        run: |
          set -euo pipefail
          echo "$GHCR_TOKEN" | helm registry login ghcr.io \
            --username "$GITHUB_ACTOR" --password-stdin
          out="$(mktemp -d)"
          helm package charts/spurfire-control \
            --version "$PACKAGE_VERSION" \
            --app-version "$APP_VERSION" \
            --destination "$out"
          package="$out/spurfire-control-${PACKAGE_VERSION}.tgz"
          test -f "$package"
          helm push "$package" "$CHART_REGISTRY" 2>&1 | tee "$out/push.log"
          digest="$(awk '/^Digest: sha256:/ { print $2 }' "$out/push.log" | tail -1)"
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]] || {
            echo "could not determine pushed chart digest" >&2
            exit 1
          }
          {
            echo "digest=$digest"
            echo "ref=$CHART_REPOSITORY@$digest"
          } >> "$GITHUB_OUTPUT"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v3

      - name: Keyless-sign image index and chart digests
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          CHART_REF: ${{ steps.chart.outputs.ref }}
        run: |
          cosign sign --yes "$IMAGE@$IMAGE_DIGEST"
          cosign sign --yes "$CHART_REF"

      - name: Attest image index build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.image.outputs.digest }}
          push-to-registry: true

      - name: Attest chart build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v3
        with:
          subject-name: ${{ env.CHART_REPOSITORY }}
          subject-digest: ${{ steps.chart.outputs.digest }}
          push-to-registry: true

      - name: Verify published artifacts
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.image.outputs.digest }}
          CHART_DIGEST: ${{ steps.chart.outputs.digest }}
          PACKAGE_VERSION: ${{ needs.metadata.outputs.chart_version }}
        run: |
          set -euo pipefail
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/packages.yml@${GITHUB_REF}"
          issuer='https://token.actions.githubusercontent.com'
          cosign verify \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "$IMAGE@$IMAGE_DIGEST" >/dev/null
          cosign verify \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "$CHART_REPOSITORY@$CHART_DIGEST" >/dev/null

          docker buildx imagetools inspect "$IMAGE@$IMAGE_DIGEST" | tee /tmp/image-manifest.txt
          grep -q 'linux/amd64' /tmp/image-manifest.txt
          grep -q 'linux/arm64' /tmp/image-manifest.txt

          verify_dir="$(mktemp -d)"
          helm pull "$CHART_REGISTRY/spurfire-control" \
            --version "$PACKAGE_VERSION" \
            --destination "$verify_dir"
          helm show chart "$verify_dir/spurfire-control-${PACKAGE_VERSION}.tgz" |
            grep -q "^version: ${PACKAGE_VERSION}$"
