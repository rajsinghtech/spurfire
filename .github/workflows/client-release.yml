name: Client Preflight

on:
  pull_request:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      candidate_mode:
        description: Candidate trust mode (trusted mode is protected and fails closed until signing is configured)
        required: true
        default: preflight
        type: choice
        options:
          - preflight
          - trusted-release

permissions:
  contents: read

concurrency:
  group: client-preflight-${{ github.ref }}
  cancel-in-progress: true

env:
  GODOT_VERSION: 4.7.1
  GODOT_RELEASE: 4.7.1-stable
  GODOT_TEMPLATE_SHA512: afcc83d8d3d298038f19c58744a0d660fa75dd4baa33cb55d1011bb2565a2a8c2381728924564cb909e37c205a23f21b521b23bd057993afd43ae4da0b2f9d47

jobs:
  metadata:
    name: Validate client candidate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.meta.outputs.version }}
      source_sha: ${{ steps.meta.outputs.source_sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - id: meta
        name: Validate candidate metadata and QA tooling
        shell: bash
        run: |
          set -euo pipefail
          version="$(scripts/check-release-metadata.sh)"
          if [[ "$GITHUB_REF_TYPE" == tag ]]; then
            test "$GITHUB_REF_NAME" = "v$version"
            scripts/check-alpha-evidence.py "docs/release-evidence/${version}.json" \
              --version "$version"
            source_sha="$(scripts/check-release-tag-binding.sh "$version" "$GITHUB_SHA")"
            git fetch --no-tags origin +refs/heads/main:refs/remotes/origin/main
            git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main
          elif [[ "$GITHUB_EVENT_NAME" == pull_request ]]; then
            source_sha="$(jq -er '.pull_request.head.sha' "$GITHUB_EVENT_PATH")"
          else
            source_sha="$GITHUB_SHA"
          fi
          [[ "$source_sha" =~ ^[0-9a-f]{40}$ ]]
          git fetch --no-tags origin "$source_sha"
          test "$(git rev-parse FETCH_HEAD)" = "$source_sha"
          bash -n scripts/check-alpha-smoke-log.sh scripts/run-alpha-two-client.sh
          python3 -m py_compile \
            scripts/aggregate-playtest.py \
            scripts/check-alpha-evidence.py \
            scripts/check-alpha-lifecycle-evidence.py \
            scripts/make-alpha-candidate-metadata.py
          python3 -m unittest discover -s scripts/tests -v
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "source_sha=$source_sha" >> "$GITHUB_OUTPUT"

  linux:
    name: Linux x86_64 client
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.source_sha }}
      - name: Assert exact qualified source checkout
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: client-linux

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes libasound2t64 libfontconfig1 libgl1 libxi6 libxcursor1 libxinerama1 libxrandr2 unzip
          editor="Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          templates="Godot_v${GODOT_RELEASE}_export_templates.tpz"
          base_url="https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 --output "$editor" "$base_url/$editor"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 --output "$templates" "$base_url/$templates"
          echo "4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9  ${editor}" | sha512sum --check
          echo "${GODOT_TEMPLATE_SHA512}  ${templates}" | sha512sum --check
          unzip -q "$editor"
          sudo install -m 0755 "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot4
          unzip -q "$templates" -d /tmp/godot-templates
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          cp -R /tmp/godot-templates/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"

      - name: Test, build, and export
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-gdext.sh debug
          scripts/test-godot.sh 2>&1 | tee "$RUNNER_TEMP/godot-smoke.log"
          grep -Fqx SPURFIRE_GODOT_SMOKE_OK "$RUNNER_TEMP/godot-smoke.log"
          grep -Fqx SPURFIRE_POLISH_SMOKE_OK "$RUNNER_TEMP/godot-smoke.log"
          grep -Fqx SPURFIRE_COMBAT_UI_SMOKE_OK "$RUNNER_TEMP/godot-smoke.log"
          if ! grep -Fqx SPURFIRE_ALPHA_LOBBY_SMOKE_OK "$RUNNER_TEMP/godot-smoke.log"; then
            echo '::warning::Candidate lacks the integrated one-lobby Alpha smoke marker; CI remains blocked.'
          fi
          scripts/build-gdext.sh release
          mkdir -p dist/linux
          godot4 --headless --path game --export-release Linux
          test -x dist/linux/Spurfire.x86_64
          tar -C dist/linux -czf dist/Spurfire-linux-x86_64.tar.gz .

      - name: Launch final Linux archive
        shell: bash
        run: |
          set -euo pipefail
          unpack="$RUNNER_TEMP/linux-final"
          mkdir -p "$unpack"
          tar -xzf dist/Spurfire-linux-x86_64.tar.gz -C "$unpack"
          timeout 120 "$unpack/Spurfire.x86_64" --headless --audio-driver Dummy --quit-after 30 \
            2>&1 | tee "$RUNNER_TEMP/linux-final.log"
          if grep -Eq 'ERROR:|SCRIPT ERROR|Parse Error' "$RUNNER_TEMP/linux-final.log"; then
            echo 'error: final Linux client emitted an error' >&2
            exit 1
          fi
          cd dist
          sha256sum Spurfire-linux-x86_64.tar.gz > Spurfire-linux-x86_64.tar.gz.sha256
          archive_sha256="$(sha256sum Spurfire-linux-x86_64.tar.gz | cut -d ' ' -f 1)"
          jq -n --arg source_sha "${{ needs.metadata.outputs.source_sha }}" \
            --arg archive_sha256 "$archive_sha256" '{
              schema_version: 1,
              platform: "linux-x86_64",
              source_sha: $source_sha,
              archive: "Spurfire-linux-x86_64.tar.gz",
              archive_sha256: $archive_sha256,
              launch_smoke_passed: true,
              signature: "unsigned_archive"
            }' > linux-trust.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-linux
          path: |
            dist/Spurfire-linux-x86_64.tar.gz
            dist/Spurfire-linux-x86_64.tar.gz.sha256
            dist/linux-trust.json
          if-no-files-found: error
          retention-days: 14

  windows:
    name: Windows x86_64 client
    needs: metadata
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.source_sha }}
      - name: Assert exact qualified source checkout
        shell: pwsh
        env:
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: if ((git rev-parse HEAD) -ne $env:SOURCE_SHA) { throw 'checkout is not the qualified source SHA' }
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: client-windows

      - name: Install Godot and export templates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $editor = "Godot_v$env:GODOT_RELEASE`_win64.exe.zip"
          $templates = "Godot_v$env:GODOT_RELEASE`_export_templates.tpz"
          $baseUrl = "https://github.com/godotengine/godot/releases/download/$env:GODOT_RELEASE"
          Invoke-WebRequest "$baseUrl/$editor" -OutFile $editor
          Invoke-WebRequest "$baseUrl/$templates" -OutFile $templates
          if ((Get-FileHash $editor -Algorithm SHA512).Hash.ToLower() -ne 'a6b02c527c18ba9936e63562032701432b2dc57d98d6483ceaccb00fe14af16af5773ae8a55e7b4d614edf121c4d9e420d870f804edb1dac16362298a01ce6c4') { throw 'Godot editor checksum mismatch' }
          if ((Get-FileHash $templates -Algorithm SHA512).Hash.ToLower() -ne $env:GODOT_TEMPLATE_SHA512) { throw 'Godot templates checksum mismatch' }
          Expand-Archive $editor -DestinationPath godot-editor
          Copy-Item "godot-editor/Godot_v$env:GODOT_RELEASE`_win64.exe" godot4.exe
          Expand-Archive $templates -DestinationPath godot-templates
          $destination = Join-Path $env:APPDATA "Godot/export_templates/$env:GODOT_VERSION.stable"
          New-Item -ItemType Directory -Force $destination | Out-Null
          Copy-Item 'godot-templates/templates/*' $destination -Recurse -Force

      - name: Build and export
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-gdext.sh debug
          scripts/build-gdext.sh release
          mkdir -p dist/windows
          ./godot4.exe --headless --path game --export-release Windows
          test -f dist/windows/Spurfire.exe

      - name: Launch, package, and record unsigned blocker
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          & dist/windows/Spurfire.exe --headless --audio-driver Dummy --quit-after 30 2>&1 | Tee-Object "$env:RUNNER_TEMP/windows-final.log"
          if ($LASTEXITCODE -ne 0) { throw "final Windows client exited $LASTEXITCODE" }
          if (Select-String -Path "$env:RUNNER_TEMP/windows-final.log" -Pattern 'ERROR:|SCRIPT ERROR|Parse Error') { throw 'final Windows client emitted an error' }
          $signature = Get-AuthenticodeSignature dist/windows/Spurfire.exe
          if ($signature.Status -eq 'Valid') { throw 'workflow contract changed: update trust handling for signed Windows candidate' }
          Compress-Archive -Path dist/windows/* -DestinationPath dist/Spurfire-windows-x86_64.zip
          $hash = (Get-FileHash dist/Spurfire-windows-x86_64.zip -Algorithm SHA256).Hash.ToLower()
          "$hash  Spurfire-windows-x86_64.zip" | Set-Content -NoNewline dist/Spurfire-windows-x86_64.zip.sha256
          [ordered]@{
            schema_version = 1
            platform = 'windows-x86_64'
            source_sha = '${{ needs.metadata.outputs.source_sha }}'
            archive = 'Spurfire-windows-x86_64.zip'
            archive_sha256 = $hash
            launch_smoke_passed = $true
            signature = 'unsigned'
            authenticode_signed = $false
          } | ConvertTo-Json -Compress | Set-Content -NoNewline dist/windows-trust.json
          Write-Output '::warning::Windows candidate is unsigned; protected trusted-release mode will fail closed.'

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-windows
          path: |
            dist/Spurfire-windows-x86_64.zip
            dist/Spurfire-windows-x86_64.zip.sha256
            dist/windows-trust.json
          if-no-files-found: error
          retention-days: 14

  macos:
    name: macOS universal client
    needs: metadata
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.source_sha }}
      - name: Assert exact qualified source checkout
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: client-macos-universal

      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          editor="Godot_v${GODOT_RELEASE}_macos.universal.zip"
          templates="Godot_v${GODOT_RELEASE}_export_templates.tpz"
          base_url="https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 --output "$editor" "$base_url/$editor"
          curl --fail --location --retry 3 --proto '=https' --tlsv1.2 --output "$templates" "$base_url/$templates"
          echo "a5c6443e193829de9a3237b57ef5e01c23839888900e241543da0dd4bac1050125e19469f0cca9a9958ac346070d98cab8e5d6aee16b181c6d06cda86bd07224  ${editor}" | shasum -a 512 -c -
          echo "${GODOT_TEMPLATE_SHA512}  ${templates}" | shasum -a 512 -c -
          unzip -q "$editor"
          sudo xattr -dr com.apple.quarantine Godot.app || true
          unzip -q "$templates" -d /tmp/godot-templates
          destination="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$destination"
          cp -R /tmp/godot-templates/templates/. "$destination/"

      - name: Build universal GDExtension and export
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p game/bin/macos
          for target in x86_64-apple-darwin aarch64-apple-darwin; do
            arch=x86_64
            test "$target" = aarch64-apple-darwin && arch=arm64
            cargo build --locked --release -p spurfire-gdext --target "$target"
            for profile in debug release; do
              cp "target/$target/release/libspurfire_godot.dylib" "game/bin/macos/libspurfire_godot.$profile.$arch.dylib"
              codesign --force --sign - "game/bin/macos/libspurfire_godot.$profile.$arch.dylib"
            done
          done
          mkdir -p dist
          ./Godot.app/Contents/MacOS/Godot --headless --path game --export-release macOS
          test -s dist/Spurfire-macos-universal.zip

      - name: Launch final archive and record Apple trust blockers
        shell: bash
        run: |
          set -euo pipefail
          unpack="$RUNNER_TEMP/macos-final"
          mkdir -p "$unpack"
          unzip -q dist/Spurfire-macos-universal.zip -d "$unpack"
          app="$(find "$unpack" -maxdepth 2 -name '*.app' -type d -print -quit)"
          test -n "$app"
          executable="$app/Contents/MacOS/Spurfire"
          test -x "$executable"
          "$executable" --headless --audio-driver Dummy --quit-after 30 2>&1 | tee "$RUNNER_TEMP/macos-final.log"
          if grep -Eq 'ERROR:|SCRIPT ERROR|Parse Error' "$RUNNER_TEMP/macos-final.log"; then
            echo 'error: final macOS client emitted an error' >&2
            exit 1
          fi
          codesign --verify --deep --strict "$app"
          details="$(codesign -dv --verbose=4 "$app" 2>&1)"
          grep -q 'Signature=adhoc' <<< "$details"
          if xcrun stapler validate "$app" >/dev/null 2>&1; then
            echo 'error: workflow contract changed: update trust handling for notarized candidate' >&2
            exit 1
          fi
          cd dist
          shasum -a 256 Spurfire-macos-universal.zip > Spurfire-macos-universal.zip.sha256
          archive_sha256="$(shasum -a 256 Spurfire-macos-universal.zip | cut -d ' ' -f 1)"
          jq -n --arg source_sha "${{ needs.metadata.outputs.source_sha }}" \
            --arg archive_sha256 "$archive_sha256" '{
              schema_version: 1,
              platform: "macos-universal",
              source_sha: $source_sha,
              archive: "Spurfire-macos-universal.zip",
              archive_sha256: $archive_sha256,
              launch_smoke_passed: true,
              signature: "ad_hoc",
              developer_id_signed: false,
              notarized: false
            }' > macos-trust.json
          echo '::warning::macOS candidate is ad-hoc signed and not notarized; protected trusted-release mode will fail closed.'

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-macos
          path: |
            dist/Spurfire-macos-universal.zip
            dist/Spurfire-macos-universal.zip.sha256
            dist/macos-trust.json
          if-no-files-found: error
          retention-days: 14

  candidate:
    name: Assemble checksummed nonpublishing candidate
    needs: [metadata, linux, windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.source_sha }}
      - name: Assert exact qualified source checkout
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          pattern: client-*
          path: candidate
          merge-multiple: true

      - name: Verify platform checksums and create candidate metadata
        shell: bash
        run: |
          set -euo pipefail
          cd candidate
          sha256sum --check Spurfire-linux-x86_64.tar.gz.sha256
          sha256sum --check Spurfire-macos-universal.zip.sha256
          sha256sum --check Spurfire-windows-x86_64.zip.sha256
          cd ..
          python3 scripts/make-alpha-candidate-metadata.py \
            --input-dir candidate \
            --output-dir candidate-metadata \
            --source-sha "${{ needs.metadata.outputs.source_sha }}" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --event "$GITHUB_EVENT_NAME"

      - name: Attest candidate archive provenance at the qualified source SHA
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v3
        env:
          # Tag events may point at metadata-only T; provenance must describe checked-out S.
          GITHUB_SHA: ${{ needs.metadata.outputs.source_sha }}
        with:
          subject-path: candidate/Spurfire-*

      - name: Verify candidate attestations
        if: github.event_name != 'pull_request'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          source_sha='${{ needs.metadata.outputs.source_sha }}'
          test "$(git rev-parse HEAD)" = "$source_sha"
          for archive in candidate/Spurfire-linux-x86_64.tar.gz candidate/Spurfire-macos-universal.zip candidate/Spurfire-windows-x86_64.zip; do
            gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY" --source-digest "$source_sha"
          done
          rm -rf candidate-metadata
          python3 scripts/make-alpha-candidate-metadata.py \
            --input-dir candidate \
            --output-dir candidate-metadata \
            --source-sha "${{ needs.metadata.outputs.source_sha }}" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --event "$GITHUB_EVENT_NAME" \
            --provenance-verified

      - name: Assemble candidate bundle
        shell: bash
        run: |
          set -euo pipefail
          cp candidate-metadata/SHA256SUMS candidate/
          cp candidate-metadata/candidate-manifest.json candidate/
          cp candidate-metadata/candidate.spdx.json candidate/
          jq -e --arg source_sha '${{ needs.metadata.outputs.source_sha }}' '
            .schema_version == 2 and
            .candidate_mode == "preflight" and
            .source_sha == $source_sha and
            .candidate_only == true and
            .release_eligible == false and
            .distribution_trust.macos.developer_id_signed == false and
            .distribution_trust.macos.notarized == false and
            .distribution_trust.windows.authenticode_signed == false and
            .publication == "forbidden"
          ' candidate/candidate-manifest.json >/dev/null
          jq -e --arg source_sha '${{ needs.metadata.outputs.source_sha }}' '
            (.documentNamespace | contains("/candidate/" + $source_sha + "/")) and
            all(.packages[]; .versionInfo == $source_sha)
          ' candidate/candidate.spdx.json >/dev/null

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: alpha-candidate-${{ needs.metadata.outputs.source_sha }}
          path: candidate
          if-no-files-found: error
          retention-days: 14

  trusted-candidate:
    name: Validate protected trusted release candidate
    if: github.event_name == 'workflow_dispatch' && inputs.candidate_mode == 'trusted-release'
    needs: [metadata, candidate]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: alpha-release
    permissions:
      actions: read
      attestations: read
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ needs.metadata.outputs.source_sha }}
      - name: Assert exact qualified source checkout
        shell: bash
        env:
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          name: alpha-candidate-${{ needs.metadata.outputs.source_sha }}
          path: trusted-candidate

      - name: Verify signed platform records and protected eligibility
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          SOURCE_SHA: ${{ needs.metadata.outputs.source_sha }}
          APPROVED_APPLE_TEAM_ID: ${{ vars.SPURFIRE_APPLE_TEAM_ID }}
          APPROVED_WINDOWS_CERTIFICATE_SHA256: ${{ vars.SPURFIRE_WINDOWS_CERTIFICATE_SHA256 }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
          [[ "$APPROVED_APPLE_TEAM_ID" =~ ^[A-Z0-9]{10}$ ]]
          [[ "$APPROVED_WINDOWS_CERTIFICATE_SHA256" =~ ^[0-9a-f]{64}$ ]]
          for archive in trusted-candidate/Spurfire-linux-x86_64.tar.gz trusted-candidate/Spurfire-macos-universal.zip trusted-candidate/Spurfire-windows-x86_64.zip; do
            gh attestation verify "$archive" --repo "$GITHUB_REPOSITORY" --source-digest "$SOURCE_SHA"
          done
          rm -f trusted-candidate/SHA256SUMS \
            trusted-candidate/candidate-manifest.json \
            trusted-candidate/candidate.spdx.json
          python3 scripts/make-alpha-candidate-metadata.py \
            --input-dir trusted-candidate \
            --output-dir trusted-metadata \
            --source-sha "$SOURCE_SHA" \
            --run-id "$GITHUB_RUN_ID" \
            --run-attempt "$GITHUB_RUN_ATTEMPT" \
            --event "$GITHUB_EVENT_NAME" \
            --candidate-mode trusted-release \
            --approved-apple-team-id "$APPROVED_APPLE_TEAM_ID" \
            --approved-windows-certificate-sha256 "$APPROVED_WINDOWS_CERTIFICATE_SHA256" \
            --provenance-verified
          cp trusted-metadata/SHA256SUMS trusted-candidate/
          cp trusted-metadata/candidate-manifest.json trusted-candidate/
          cp trusted-metadata/candidate.spdx.json trusted-candidate/
          jq -e --arg source_sha "$SOURCE_SHA" --argjson run_id "$GITHUB_RUN_ID" '
            .schema_version == 2 and
            .candidate_mode == "trusted-release" and
            .candidate_only == false and
            .release_eligible == true and
            .source_sha == $source_sha and
            .workflow.run_id == $run_id and
            .workflow.event == "workflow_dispatch" and
            .provenance_verified == true and
            .distribution_trust.macos.developer_id_signed == true and
            .distribution_trust.macos.notarized == true and
            .distribution_trust.windows.authenticode_signed == true and
            .blockers == [] and
            .publication == "protected_manual_only"
          ' trusted-candidate/candidate-manifest.json >/dev/null
          jq -e --arg source_sha "$SOURCE_SHA" '
            .documentNamespace | contains("/candidate/" + $source_sha + "/")
          ' trusted-candidate/candidate.spdx.json >/dev/null
          jq -e --arg source_sha "$SOURCE_SHA" '
            all(.packages[]; .versionInfo == $source_sha)
          ' trusted-candidate/candidate.spdx.json >/dev/null

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: alpha-trusted-candidate-${{ needs.metadata.outputs.source_sha }}
          path: trusted-candidate
          if-no-files-found: error
          retention-days: 14
