name: Client Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: client-release-${{ github.ref }}
  cancel-in-progress: false

env:
  GODOT_VERSION: 4.7.1
  GODOT_RELEASE: 4.7.1-stable
  GODOT_TEMPLATE_SHA512: afcc83d8d3d298038f19c58744a0d660fa75dd4baa33cb55d1011bb2565a2a8c2381728924564cb909e37c205a23f21b521b23bd057993afd43ae4da0b2f9d47

jobs:
  metadata:
    name: Validate client release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: meta
        shell: bash
        run: |
          set -euo pipefail
          tag="$GITHUB_REF_NAME"
          [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]] || {
            echo "client releases require a vX.Y.Z tag" >&2
            exit 1
          }
          version="${tag#v}"
          server_version="$(awk '/^version = / { gsub(/[\" ]/, "", $3); print $3; exit }' crates/spurfire-server/Cargo.toml)"
          test "$version" = "$server_version"
          test -s "docs/release-notes-${version}.md"
          echo "version=$version" >> "$GITHUB_OUTPUT"

  linux:
    name: Linux x86_64 client
    needs: metadata
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: client-linux
      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install --yes libasound2t64 libfontconfig1 libgl1 libxi6 libxcursor1 libxinerama1 libxrandr2 unzip
          editor="Godot_v${GODOT_RELEASE}_linux.x86_64.zip"
          templates="Godot_v${GODOT_RELEASE}_export_templates.tpz"
          curl -fL --retry 3 -O "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${editor}"
          curl -fL --retry 3 -O "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${templates}"
          echo "4ccdab7a48eeccbe8819a2fc1f6262f8d72065d98601bcb3743fcbd7ebd39f373758a788ee3293a05ec5b2c48538266c437404312e372225cd2df273945a2de9  ${editor}" | sha512sum -c -
          echo "${GODOT_TEMPLATE_SHA512}  ${templates}" | sha512sum -c -
          unzip -q "$editor"
          sudo install -m 0755 "Godot_v${GODOT_RELEASE}_linux.x86_64" /usr/local/bin/godot4
          unzip -q "$templates" -d /tmp/godot-templates
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          cp -R /tmp/godot-templates/templates/. "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"
      - name: Build and export
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-gdext.sh debug
          scripts/build-gdext.sh release
          mkdir -p dist/linux
          godot4 --headless --path game --export-release Linux
          test -x dist/linux/Spurfire.x86_64
          tar -C dist/linux -czf dist/Spurfire-linux-x86_64.tar.gz .
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-linux
          path: dist/Spurfire-linux-x86_64.tar.gz

  windows:
    name: Windows x86_64 client
    needs: metadata
    runs-on: windows-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: client-windows
      - name: Install Godot and export templates
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $editor = "Godot_v$env:GODOT_RELEASE`_win64.exe.zip"
          $templates = "Godot_v$env:GODOT_RELEASE`_export_templates.tpz"
          Invoke-WebRequest "https://github.com/godotengine/godot/releases/download/$env:GODOT_RELEASE/$editor" -OutFile $editor
          Invoke-WebRequest "https://github.com/godotengine/godot/releases/download/$env:GODOT_RELEASE/$templates" -OutFile $templates
          if ((Get-FileHash $editor -Algorithm SHA512).Hash.ToLower() -ne 'a6b02c527c18ba9936e63562032701432b2dc57d98d6483ceaccb00fe14af16af5773ae8a55e7b4d614edf121c4d9e420d870f804edb1dac16362298a01ce6c4') { throw 'Godot editor checksum mismatch' }
          if ((Get-FileHash $templates -Algorithm SHA512).Hash.ToLower() -ne $env:GODOT_TEMPLATE_SHA512) { throw 'Godot templates checksum mismatch' }
          Expand-Archive $editor -DestinationPath godot-editor
          Copy-Item "godot-editor/Godot_v$env:GODOT_RELEASE`_win64.exe" godot4.exe
          Expand-Archive $templates -DestinationPath godot-templates
          $destination = Join-Path $env:APPDATA "Godot/export_templates/$env:GODOT_VERSION.stable"
          New-Item -ItemType Directory -Force $destination | Out-Null
          Copy-Item 'godot-templates/templates/*' $destination -Recurse -Force
      - name: Build and export
        shell: bash
        run: |
          set -euo pipefail
          scripts/build-gdext.sh debug
          scripts/build-gdext.sh release
          mkdir -p dist/windows
          ./godot4.exe --headless --path game --export-release Windows
          test -f dist/windows/Spurfire.exe
      - name: Package
        shell: pwsh
        run: Compress-Archive -Path dist/windows/* -DestinationPath dist/Spurfire-windows-x86_64.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-windows
          path: dist/Spurfire-windows-x86_64.zip

  macos:
    name: macOS universal client
    needs: metadata
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable
          targets: x86_64-apple-darwin,aarch64-apple-darwin
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          key: client-macos-universal
      - name: Install Godot and export templates
        shell: bash
        run: |
          set -euo pipefail
          editor="Godot_v${GODOT_RELEASE}_macos.universal.zip"
          templates="Godot_v${GODOT_RELEASE}_export_templates.tpz"
          curl -fL --retry 3 -O "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${editor}"
          curl -fL --retry 3 -O "https://github.com/godotengine/godot/releases/download/${GODOT_RELEASE}/${templates}"
          echo "a5c6443e193829de9a3237b57ef5e01c23839888900e241543da0dd4bac1050125e19469f0cca9a9958ac346070d98cab8e5d6aee16b181c6d06cda86bd07224  ${editor}" | shasum -a 512 -c -
          echo "${GODOT_TEMPLATE_SHA512}  ${templates}" | shasum -a 512 -c -
          unzip -q "$editor"
          sudo xattr -dr com.apple.quarantine Godot.app || true
          unzip -q "$templates" -d /tmp/godot-templates
          destination="$HOME/Library/Application Support/Godot/export_templates/${GODOT_VERSION}.stable"
          mkdir -p "$destination"
          cp -R /tmp/godot-templates/templates/. "$destination/"
      - name: Build universal GDExtension and export
        shell: bash
        run: |
          set -euo pipefail
          for target in x86_64-apple-darwin aarch64-apple-darwin; do
            arch=x86_64
            test "$target" = aarch64-apple-darwin && arch=arm64
            for profile in debug release; do
              if test "$profile" = release; then
                cargo build --locked -p spurfire-gdext --target "$target" --release
              else
                cargo build --locked -p spurfire-gdext --target "$target"
              fi
              mkdir -p game/bin/macos
              cp "target/$target/$profile/libspurfire_godot.dylib" "game/bin/macos/libspurfire_godot.$profile.$arch.dylib"
              codesign --force --sign - "game/bin/macos/libspurfire_godot.$profile.$arch.dylib"
            done
          done
          mkdir -p dist
          ./Godot.app/Contents/MacOS/Godot --headless --path game --export-release macOS
          test -s dist/Spurfire-macos-universal.zip
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: client-macos
          path: dist/Spurfire-macos-universal.zip

  release:
    name: Publish GitHub Release
    if: github.event_name == 'push' && github.ref_type == 'tag'
    needs: [metadata, linux, windows, macos]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8092 # v4
        with:
          pattern: client-*
          path: dist
          merge-multiple: true
      - name: Publish checksummed clients
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.metadata.outputs.version }}
        run: |
          set -euo pipefail
          cd dist
          sha256sum Spurfire-* > SHA256SUMS
          cd ..
          notes="docs/release-notes-${VERSION}.md"
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/Spurfire-* dist/SHA256SUMS --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/Spurfire-* dist/SHA256SUMS \
              --verify-tag --title "Spurfire ${VERSION}" --notes-file "$notes"
          fi
