{{- include "spurfire-control.validateValues" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spurfire-control.fullname" . }}
  labels:
    {{- include "spurfire-control.labels" . | nindent 4 }}
spec:
  replicas: 1
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "spurfire-control.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "spurfire-control.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: control-plane
        app.kubernetes.io/part-of: spurfire
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "spurfire-control.serviceAccountName" . }}
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.priorityClassName }}
      priorityClassName: {{ . | quote }}
      {{- end }}
      containers:
        {{- if .Values.protectedAlpha.enabled }}
        # Credential-free HTTP worker. It receives neither TS_* environment nor
        # credential/vault mounts; only authenticated IPC crosses the socket.
        - name: alpha-worker
          image: {{ include "spurfire-control.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/spurfire-alpha-worker"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          ports:
            - { name: http, containerPort: 8080, protocol: TCP }
          volumeMounts:
            - { name: state, mountPath: /var/lib/spurfire }
            - { name: broker-ipc, mountPath: /run/spurfire }
            - { name: tmp, mountPath: /tmp }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        # Private supervisor/broker custody container. It has no TCP port and no
        # Service/HTTPRoute. Credential and vault-key mounts do not exist in the worker.
        - name: alpha-broker
          image: {{ include "spurfire-control.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/spurfire-alpha-launcher"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: state, mountPath: /var/lib/spurfire }
            - { name: broker-ipc, mountPath: /run/spurfire }
            - { name: alpha-receipt, mountPath: /run/alpha-receipt, readOnly: true }
            - { name: alpha-credential, mountPath: /run/alpha-custody, readOnly: true }
            - { name: alpha-vault-key, mountPath: /run/alpha-vault-key, readOnly: true }
            - { name: tmp, mountPath: /tmp }
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
        {{- else }}
        - name: spurfire-server
          image: {{ include "spurfire-control.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "spurfire-control.fullname" . }}
          {{- if not .Values.config.dryRun }}
          env:
            - name: TS_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tailscale.existingSecret | quote }}
                  key: {{ .Values.tailscale.clientIdKey | quote }}
            - name: TS_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.tailscale.existingSecret | quote }}
                  key: {{ .Values.tailscale.clientSecretKey | quote }}
          {{- end }}
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          # /healthz returns 200 even when provisioning is degraded, so
          # readiness must inspect the boolean response field.
          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -ec
                - >-
                  wget -qO- http://127.0.0.1:8080/healthz |
                  grep -q '"provisioning_ready":true'
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /var/lib/spurfire
            - name: tmp
              mountPath: /tmp
            {{ if .Values.childVault.existingSecret }}
            - name: child-vault-key
              mountPath: {{ .Values.childVault.mountPath | quote }}
              subPath: {{ .Values.childVault.key | quote }}
              readOnly: true
            {{ end }}
        {{- end }}
      volumes:
        - name: state
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "spurfire-control.stateClaimName" . | quote }}
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: tmp
          emptyDir:
            sizeLimit: 16Mi
        {{- if .Values.protectedAlpha.enabled }}
        - name: broker-ipc
          emptyDir: { sizeLimit: 1Mi }
        - name: alpha-receipt
          secret:
            secretName: {{ .Values.protectedAlpha.receiptSecret | quote }}
            defaultMode: 0400
        - name: alpha-credential
          secret:
            secretName: {{ .Values.protectedAlpha.credentialSecret | quote }}
            defaultMode: 0400
        - name: alpha-vault-key
          secret:
            secretName: {{ .Values.protectedAlpha.vaultKeySecret | quote }}
            defaultMode: 0400
        {{- end }}
        {{ if .Values.childVault.existingSecret }}
        - name: child-vault-key
          secret:
            secretName: {{ .Values.childVault.existingSecret | quote }}
            defaultMode: 0440
        {{ end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
