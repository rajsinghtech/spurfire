apiVersion: v1
kind: Service
metadata:
  name: {{ include "spurfire-control.fullname" . }}
  labels:
    {{- include "spurfire-control.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: ClusterIP
  ports:
    - name: http
      port: {{ .Values.service.port }}
      protocol: TCP
      targetPort: http
  selector:
    {{- include "spurfire-control.selectorLabels" . | nindent 4 }}
