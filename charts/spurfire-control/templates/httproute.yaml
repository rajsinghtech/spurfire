{{- if .Values.httpRoute.enabled }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "spurfire-control.fullname" . }}
  labels:
    {{- include "spurfire-control.labels" . | nindent 4 }}
  {{- with .Values.httpRoute.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  parentRefs:
    {{- toYaml .Values.httpRoute.parentRefs | nindent 4 }}
  hostnames:
    {{- toYaml .Values.httpRoute.hostnames | nindent 4 }}
  rules:
    - matches:
        - path:
            type: {{ .Values.httpRoute.path.type }}
            value: {{ .Values.httpRoute.path.value | quote }}
      backendRefs:
        - group: ""
          kind: Service
          name: {{ include "spurfire-control.fullname" . }}
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
