{{- if .Values.protectedAlpha.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "spurfire-control.fullname" . }}-broker
  labels:
    {{- include "spurfire-control.brokerLabels" . | nindent 4 }}
spec:
  replicas: 1
  strategy: { type: Recreate }
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  selector:
    matchLabels:
      {{- include "spurfire-control.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: provider-broker
  template:
    metadata:
      labels:
        {{- include "spurfire-control.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: provider-broker
        app.kubernetes.io/part-of: spurfire
      annotations:
        alpha.spurfire.dev/runtime-image-digest: {{ .Values.protectedAlpha.runtimeImageDigest | quote }}
        alpha.spurfire.dev/broker-image-digest: {{ .Values.protectedAlpha.brokerImageDigest | quote }}
        alpha.spurfire.dev/source-sha: {{ .Values.protectedAlpha.sourceSha | quote }}
        alpha.spurfire.dev/provenance-sha256: {{ .Values.protectedAlpha.provenanceSha256 | quote }}
        alpha.spurfire.dev/artifact-set-sha256: {{ .Values.protectedAlpha.artifactSetSha256 | quote }}
        alpha.spurfire.dev/policy-profile-sha256: {{ .Values.protectedAlpha.policyProfileSha256 | quote }}
        alpha.spurfire.dev/public-origin: {{ .Values.protectedAlpha.publicOrigin | quote }}
        alpha.spurfire.dev/internal-listener: {{ .Values.protectedAlpha.internalListener | quote }}
    spec:
      serviceAccountName: {{ include "spurfire-control.fullname" . }}-broker
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: { type: RuntimeDefault }
      initContainers:
        # kubelet applies fsGroup before init containers. Reassert the vault's
        # owner-only custody boundary after that recursive permission pass.
        - name: custody-permissions
          image: {{ printf "%s@%s" .Values.image.repository .Values.protectedAlpha.brokerImageDigest | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - >-
              chown 10001:10001 /var/lib/spurfire &&
              chmod 0700 /var/lib/spurfire &&
              touch /var/lib/spurfire/child-vault.json.lock &&
              chown 10001:10001 /var/lib/spurfire/child-vault.json.lock &&
              chmod 0600 /var/lib/spurfire/child-vault.json.lock;
              if [ -e /var/lib/spurfire/child-vault.json ]; then
                chown 10001:10001 /var/lib/spurfire/child-vault.json &&
                chmod 0600 /var/lib/spurfire/child-vault.json;
              fi
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
          volumeMounts:
            - { name: broker-state, mountPath: /var/lib/spurfire }
        # Secret volumes are symlink farms. Copy the vault key to a private,
        # regular file so the broker's O_NOFOLLOW reader can accept it.
        - name: vault-key-copy
          image: {{ printf "%s@%s" .Values.image.repository .Values.protectedAlpha.brokerImageDigest | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - >-
              cp /source/vault.key /target/vault.key &&
              chown 10001:10001 /target/vault.key &&
              chmod 0400 /target/vault.key &&
              chown 10001:10001 /target &&
              chmod 0700 /target
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER"]
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
          volumeMounts:
            - { name: broker-vault-key-source, mountPath: /source, readOnly: true }
            - { name: broker-vault-key, mountPath: /target }
        # Run last as the unprivileged broker identity. This closes the lock
        # mode after any inherited fsGroup/default-ACL behavior and verifies
        # that only a 32-byte regular key reaches the broker container.
        - name: custody-fence
          image: {{ printf "%s@%s" .Values.image.repository .Values.protectedAlpha.brokerImageDigest | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /bin/sh
            - -ec
            - >-
              umask 077;
              exec 9<>/var/lib/spurfire/child-vault.json.lock;
              chmod 0600 /var/lib/spurfire/child-vault.json.lock;
              test ! -L /run/private-vault-key/vault.key;
              test "$(wc -c < /run/private-vault-key/vault.key)" -eq 32;
              test "$(stat -c %a /var/lib/spurfire)" = 700;
              test "$(stat -c %a /var/lib/spurfire/child-vault.json.lock)" = 600;
              test "$(stat -c %a /run/private-vault-key/vault.key)" = 400
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          resources:
            requests: { cpu: 10m, memory: 16Mi }
            limits: { cpu: 50m, memory: 32Mi }
          volumeMounts:
            - { name: broker-state, mountPath: /var/lib/spurfire }
            - { name: broker-vault-key, mountPath: /run/private-vault-key, readOnly: true }
      containers:
        - name: provider-broker
          image: {{ printf "%s@%s" .Values.image.repository .Values.protectedAlpha.brokerImageDigest | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ["/usr/local/bin/spurfire-provider-broker"]
          ports:
            - { name: mtls, containerPort: 9443, protocol: TCP }
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
          volumeMounts:
            - { name: broker-credential, mountPath: /run/alpha-custody, readOnly: true }
            - { name: broker-vault-key, mountPath: /run/alpha-vault-key, readOnly: true }
            - { name: broker-tls, mountPath: /run/broker-tls, readOnly: true }
            - { name: broker-mac, mountPath: /run/broker-mac, readOnly: true }
            - { name: alpha-config, mountPath: /run/alpha-config, readOnly: true }
            - { name: alpha-receipt, mountPath: /run/alpha-receipt, readOnly: true }
            - { name: alpha-pod-bindings, mountPath: /run/alpha-pod, readOnly: true }
            - { name: broker-state, mountPath: /var/lib/spurfire }
            - { name: tmp, mountPath: /tmp }
          startupProbe:
            tcpSocket: { port: mtls }
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 30
          livenessProbe:
            tcpSocket: { port: mtls }
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            tcpSocket: { port: mtls }
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 2
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: broker-credential
          secret:
            secretName: {{ .Values.protectedAlpha.brokerCredentialSopsSecret | quote }}
            defaultMode: 0400
            items:
              - key: {{ .Values.protectedAlpha.credentialKey | quote }}
                path: organization-oauth.json
                mode: 0400
        - name: broker-vault-key
          emptyDir: { sizeLimit: 1Mi }
        - name: broker-vault-key-source
          secret:
            secretName: {{ .Values.protectedAlpha.brokerVaultKeySopsSecret | quote }}
            defaultMode: 0400
            items:
              - key: {{ .Values.protectedAlpha.vaultKey | quote }}
                path: vault.key
                mode: 0400
        - name: broker-tls
          secret:
            secretName: {{ .Values.protectedAlpha.brokerTlsSecret | quote }}
            defaultMode: 0400
        - name: broker-mac
          secret:
            secretName: {{ .Values.protectedAlpha.brokerMacSecret | quote }}
            defaultMode: 0400
        - name: alpha-config
          configMap:
            name: {{ .Values.protectedAlpha.publicConfigMap | quote }}
            defaultMode: 0400
        - name: alpha-receipt
          secret:
            secretName: {{ .Values.protectedAlpha.receiptSopsSecret | quote }}
            defaultMode: 0400
            items:
              - key: {{ .Values.protectedAlpha.receiptKey | quote }}
                path: receipt.json
                mode: 0400
        - name: alpha-pod-bindings
          downwardAPI:
            defaultMode: 0400
            items:
              - path: runtime-image-digest
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/runtime-image-digest']"
              - path: broker-image-digest
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/broker-image-digest']"
              - path: source-sha
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/source-sha']"
              - path: provenance-sha256
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/provenance-sha256']"
              - path: artifact-set-sha256
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/artifact-set-sha256']"
              - path: policy-profile-sha256
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/policy-profile-sha256']"
              - path: public-origin
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/public-origin']"
              - path: internal-listener
                fieldRef:
                  fieldPath: "metadata.annotations['alpha.spurfire.dev/internal-listener']"
        - name: broker-state
          persistentVolumeClaim:
            claimName: {{ include "spurfire-control.fullname" . }}-broker
        - name: tmp
          emptyDir: { sizeLimit: 16Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "spurfire-control.fullname" . }}-broker
  labels:
    {{- include "spurfire-control.brokerLabels" . | nindent 4 }}
  annotations:
    alpha.spurfire.dev/private-only: "true"
spec:
  type: ClusterIP
  ports:
    - { name: mtls, port: {{ .Values.protectedAlpha.brokerServicePort }}, targetPort: mtls, protocol: TCP }
  selector:
    {{- include "spurfire-control.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: provider-broker
{{- end }}
