# Safe default: credential-free, zero-mutation dry-run mode.
nameOverride: ""
fullnameOverride: ""

image:
  repository: ghcr.io/rajsinghtech/spurfire-server
  tag: ""
  digest: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

config:
  dryRun: true
  # Independent provider-mutation kill switch. This chart revision is
  # activation-closed and rejects true until the auth, encrypted child-
  # credential recovery, and startup-reconciliation gates are implemented.
  realMutationsEnabled: false
  # Separate product admission stays closed even in private provider staging.
  realAdmissionEnabled: false
  allowLegacyClientAssertions: false
  trustForwardedFor: false
  # Alpha safety invariant: shared compatibility mode cannot bypass this cap.
  maxActiveRealLobbies: 1
  dryRunTtlSeconds: 300
  maxPlayers: 16
  provisioningMode: dry_run
  sharedTailnet: "-"
  statePath: /var/lib/spurfire/server-state.json
  childVaultPath: /var/lib/spurfire/child-vault.json

# Root/workload-managed encryption key for dynamic child custody. This is not a
# destination for child OAuth plaintext and remains absent in hosted dry-run.
childVault:
  existingSecret: ""
  key: vault.key
  mountPath: /var/run/secrets/spurfire/vault.key

# Separate, receipt-gated execution plane. This mode is mutually exclusive with
# the ordinary dry-run container and has no environment activation switch.
protectedAlpha:
  enabled: false
  # Credential-free first phase: create the retained stores and unbound Lease,
  # then run the digest-only bootstrap Job. It is mutually exclusive with the
  # receipt-qualified runtime.
  prepare: false
  installationId: ""
  authorizedLobbyId: ""
  publicOrigin: ""
  internalListener: ""
  sourceSha: ""
  provenanceSha256: ""
  artifactSetSha256: ""
  policyProfileSha256: ""
  leaseName: spurfire-protected-alpha
  runtimeImageDigest: ""
  brokerImageDigest: ""
  receiptSopsSecret: ""
  receiptKey: receipt.json
  brokerCredentialSopsSecret: ""
  credentialKey: organization-oauth.json
  brokerVaultKeySopsSecret: ""
  vaultKey: vault.key
  runtimeTlsSecret: ""
  brokerTlsSecret: ""
  brokerMacSecret: ""
  publicConfigMap: ""
  brokerServicePort: 9443
  # Exact control-plane Service/external endpoint CIDRs. Required in protected
  # mode because NetworkPolicy cannot select the kubernetes.default Service.
  kubernetesApiServerCidrs: []

# Cached one-lobby network-summary timing contract. Collection is performed by
# background workers; an inspection GET must never trigger provider I/O.
networkSummary:
  deviceInventory:
    refreshSeconds: 15
    freshForSeconds: 30
  organizationPresence:
    refreshSeconds: 60
    freshForSeconds: 120
  participantReports:
    freshForSeconds: 15
    retentionSeconds: 60

tailscale:
  apiBase: https://api.tailscale.com/api/v2
  # Activation-closed non-dry-run staging reads parent OAuth credentials from
  # this pre-existing Secret. The chart never accepts or renders values and
  # this is not a vault for dynamically generated child OAuth material.
  existingSecret: ""
  clientIdKey: TS_CLIENT_ID
  clientSecretKey: TS_CLIENT_SECRET

persistence:
  enabled: false
  existingClaim: ""
  storageClass: ""
  accessModes:
    - ReadWriteOnce
  size: 1Gi
  retain: true
  annotations: {}

service:
  annotations: {}
  port: 80

# Gateway API must already be installed. Public routing is opt-in and chart
# validation restricts it to credential-free dry-run mode.
httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: public-gateway
      namespace: gateway-system
  hostnames:
    - spurfire.rajsingh.info
  path:
    type: PathPrefix
    value: /

podAnnotations: {}
podLabels: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []
priorityClassName: ""
terminationGracePeriodSeconds: 900
revisionHistoryLimit: 3
