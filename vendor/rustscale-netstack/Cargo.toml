[package]
name = "rustscale-netstack"
description = "Userspace TCP/IP stack for rustscale (smoltcp over WireGuard)"
version = "0.1.3"
edition = "2021"
rust-version = "1.91"
license = "BSD-3-Clause"
repository = "https://github.com/rajsinghtech/rustscale"

[dependencies]
rustscale-wg = { git = "https://github.com/rajsinghtech/rustscale", rev = "8511e0b78074bf07b59d53cf1a2eb349cd0d2407", version = "0.1.3" }
rustscale-key = { git = "https://github.com/rajsinghtech/rustscale", rev = "8511e0b78074bf07b59d53cf1a2eb349cd0d2407", version = "0.1.3" }
rustscale-packet = { git = "https://github.com/rajsinghtech/rustscale", rev = "8511e0b78074bf07b59d53cf1a2eb349cd0d2407", version = "0.1.3" }
smoltcp = { version = "0.13", default-features = false, features = ["medium-ip", "proto-ipv4", "socket-tcp", "socket-udp", "alloc"] }
thiserror = "1"
tokio = { version = "1", features = ["full"] }
bytes = "1"
tokio-util = "0.7"

[dev-dependencies]
tokio = { version = "1", features = ["full", "test-util"] }

[workspace]

[patch.crates-io]
boringtun = { path = "../boringtun" }
